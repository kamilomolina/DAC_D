{% extends 'componentes/menu_bancario.html' %}
{% load static %}

{% block title %}
Configuración Destinos y Procedencias
{% endblock %}

{% block body %}
<style>
    /* ancho SOLO del dropdown */
    .select2-container--default .select2-dropdown {
        width: 400px !important;
    }

    /* opcional: texto completo sin cortarse */
    .select2-results__option {
        white-space: nowrap;
    }

    /* Ajustes visuales status de asignación */
    .btn-toggle-assign {
        transition: all 0.3s ease;
    }

    .btn-toggle-assign.add {
        color: #10b981;
        border: 1px solid #10b981;
        background: transparent;
    }

    .btn-toggle-assign.add:hover {
        background: #10b981;
        color: white;
    }

    .btn-toggle-assign.remove {
        color: #f43f5e;
        border: 1px solid #f43f5e;
        background: transparent;
    }

    .btn-toggle-assign.remove:hover {
        background: #f43f5e;
        color: white;
    }

    .assigned-status {
        color: #10b981;
        font-weight: bold;
    }

    .unassigned-status {
        color: #f43f5e;
        font-weight: bold;
    }
</style>

<div class="row align-items-center border-bottom mb-3 py-2 bg-white shadow-sm mx-0">
    <div class="col d-flex align-items-center px-0">
        <button id="toggle-sidebar" class="btn btn-primary btn-sm me-3 border-0 rounded-circle btnMenu"
            style="width: 32px; height: 32px; padding: 0;" title="Mostrar/Ocultar menú">
            <i class="fas fa-bars"></i>
        </button>
        <h6 class="page-title mb-0 fs-5 fw-bold text-dark">
            <i class="fas fa-cogs text-info me-2"></i>CONFIGURACIÓN DESTINOS Y PROCEDENCIAS POR USUARIO
        </h6>
    </div>
</div>

<div class="container-fluid px-0 mt-1">
    <div class="card shadow-sm rounded-4 mb-3 border-0 mx-0">
        <div class="card-body py-3">
            <div class="row g-3 d-flex align-items-end mx-0">
                <div class="col-md-4 mb-3">
                    <label for="selectUsuario" class="form-label text-dark fw-bold">Usuario</label>
                    <select id="selectUsuario" class="form-select form-select-sm select2" style="width: 100%;">
                        <option value="">-- Seleccione Usuario --</option>
                        {% for u in usersData %}
                        <option value="{{ u.PkUsuario }}">{{ u.Nombre }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="col-md-2 mb-3">
                    <label for="selectTipo" class="form-label text-dark fw-bold">Tipo de Acceso</label>
                    <select id="selectTipo" class="form-select form-select-sm text-dark">
                        <option value="1">Destinos</option>
                        <option value="2">Procedencias</option>
                    </select>
                </div>

                <!-- <div class="col-md-2 mb-3">
                    <button class="btn btn-sm btn-success w-100" id="btnBuscar">
                        <i class="fas fa-search me-1"></i> Cargar Relaciones
                    </button>
                </div> -->

            </div>
        </div>
    </div>

    <!-- Tabla DataTables -->
    <div class="card shadow-sm rounded-4 border-0 mx-0">
        <div class="card-body p-2">
            <div class="row mx-0">
                <div class="table-responsive px-0">
                    <table id="tablaConfiguracion"
                        class="table table-striped table-bordered mb-0 table-sm rounded-4 table-hover align-middle display nowrap"
                        style="width: 100%;">
                        <thead class="table-gradient text-dark">
                            <tr>
                                <th>ID Registro</th>
                                <th>Nombre</th>
                                <th>Empresa</th>
                                <th>Estado</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                        </tbody>
                        <tfoot class="table-active">
                            <tr>
                                <th></th>
                                <th></th>
                                <th></th>
                                <th></th>
                                <th></th>
                            </tr>
                        </tfoot>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<a href="{% url 'panel_bancario' %}">
    <button class="btn btn-sm btn-danger" id="btnCerrar" title="Cerrar"
        style="position: fixed; bottom: 20px; right: 20px;">
        <i class="fa fa-times"></i> Cerrar
    </button>
</a>

{% endblock %}

{% block scripts %}
<script>
    $(document).ready(function () {

        $('#selectUsuario').val(0).trigger("change");

        // Inicializar Select2
        $('#selectUsuario').select2({
            theme: "classic",
            placeholder: "-- Seleccione Usuario --",
            allowClear: true
        });

        // Configurar DataTable vacío inicialmente
        var tableConfiguracion = $('#tablaConfiguracion').DataTable({
            autoWidth: false,
            scrollX: true,
            scrollY: '350px',
            scrollCollapse: true,
            pageLength: 50,
            dom: 'Bfrtip',
            language: {
                url: "{% static 'app/th/json/es-ES.json' %}",
            },
            buttons: [
                {
                    extend: 'excel',
                    text: '<i class="fas fa-file-excel"></i>',
                    titleAttr: 'Exportar a Excel',
                    className: 'btn btn-success btn-sm',
                },
                {
                    extend: 'pdf',
                    text: '<i class="fas fa-file-pdf"></i>',
                    titleAttr: 'Exportar a PDF',
                    className: 'btn btn-danger btn-sm',
                },
                {
                    extend: 'print',
                    text: '<i class="fas fa-print"></i>',
                    titleAttr: 'Imprimir',
                    className: 'btn btn-primary btn-sm',
                }
            ],
            columns: [
                { data: 'id', width: '10%' },
                { data: 'nombre', width: '40%' },
                { data: 'empresa', width: '25%' },
                {
                    data: 'Asignado',
                    width: '15%',
                    className: 'text-center',
                    render: function (data, type, row) {
                        if (data == 1 || data == '1') {
                            return '<span class="assigned-status"><i class="fas fa-check-circle"></i> Asignado</span>';
                        } else {
                            return '<span class="unassigned-status"><i class="fas fa-times-circle"></i> Sin Asignar</span>';
                        }
                    }
                },
                {
                    data: null,
                    width: '10%',
                    className: 'text-center',
                    render: function (data, type, row) {
                        var isAssigned = (row.Asignado == 1 || row.Asignado == '1');
                        if (isAssigned) {
                            return `<button class="btn btn-sm btn-toggle-assign remove" onclick="toggleAssign(this, ${row.id}, 'remove')" title="Quitar Acceso"><i class="fas fa-trash-alt"></i> Remover</button>`;
                        } else {
                            return `<button class="btn btn-sm btn-toggle-assign add" onclick="toggleAssign(this, ${row.id}, 'add')" title="Agregar Acceso"><i class="fas fa-plus"></i> Asignar</button>`;
                        }
                    }
                }
            ],
            order: [[1, "asc"]],
        });


        $('#selectUsuario, #selectTipo').on('change', function () {
            if ($('#selectUsuario').val()) {
                cargarDatos();
            }
        });


        window.toggleAssign = function (btn, registro_id, accion) {
            var usuario_id = $('#selectUsuario').val();
            var tipo = $('#selectTipo').val();

            if (!usuario_id) return;

            var $btn = $(btn);
            $btn.prop('disabled', true);

            $.ajax({
                url: '{% url "bk_toggle_asignacion" %}',
                type: 'POST',
                data: {
                    'usuario_id': usuario_id,
                    'tipo': tipo,
                    'registro_id': registro_id,
                    'accion': accion,
                    'csrfmiddlewaretoken': '{{ csrf_token }}'
                },
                success: function (response) {
                    if (response.success) {

                        var tr = $btn.closest('tr');
                        var row = tableConfiguracion.row(tr);
                        var rowData = row.data();

                        if (accion === 'add') {
                            rowData.Asignado = 1;
                            appToast.success("Acceso asignado correctamente.");
                        } else {
                            rowData.Asignado = 0;
                            appToast.warning("Acceso removido.");
                        }

                        row.data(rowData).draw(false);

                    } else {
                        Swal.fire('Error', response.msg, 'error');
                        $btn.prop('disabled', false);
                    }
                },
                error: function (err) {
                    Swal.fire('Error', 'No se pudo completar la acción.', 'error');
                    $btn.prop('disabled', false);
                }
            });
        };


        function cargarDatos() {
            var usuario_id = $('#selectUsuario').val();
            var tipo = $('#selectTipo').val();

            if (!usuario_id) {
                Swal.fire('Atención', 'Debe seleccionar un usuario primero.', 'warning');
                return;
            }

            showLoadingScreen("Cargando relaciones...");

            $.ajax({
                url: '{% url "bk_get_lista_asignaciones" %}',
                type: 'POST',
                data: {
                    'usuario_id': usuario_id,
                    'tipo': tipo,
                    'csrfmiddlewaretoken': '{{ csrf_token }}'
                },
                success: function (response) {
                    Swal.close();
                    if (response.success) {
                        tableConfiguracion.clear();
                        tableConfiguracion.rows.add(response.data);
                        tableConfiguracion.columns.adjust().draw();
                    } else {
                        Swal.fire('Error', response.msg, 'error');
                    }
                },
                error: function (err) {
                    Swal.close();
                    Swal.fire('Error', 'Error al obtener los datos del servidor.', 'error');
                    console.error(err);
                }
            });
        }
    });
</script>
{% endblock %}
