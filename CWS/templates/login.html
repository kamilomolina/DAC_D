{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CWS</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">

    <!-- Theme Stylesheet (Default: Dark) -->
    <link id="theme-stylesheet" rel="stylesheet" href="{% static 'app/css/CWS_LOGIN.css' %}">

    <!-- Theme Switcher Script (Runs immediately to prevent flicker) -->
    <script>
        const darkThemeUrl = "{% static 'app/css/CWS_LOGIN.css' %}";
        const lightThemeUrl = "{% static 'app/css/CWS_LOGIN_WHITE.css' %}";
        const preferredTheme = localStorage.getItem('cws_theme') || 'dark';

        if (preferredTheme === 'light') {
            document.getElementById('theme-stylesheet').setAttribute('href', lightThemeUrl);
        }
    </script>


    <link rel="icon" href="{% static 'app/cws/images/favicon.ico' %}" type="image/x-icon">
    <link rel="apple-touch-icon" sizes="180x180" href="{% static 'app/cws/images/apple-touch-icon.png' %}">
    <link rel="icon" type="image/png" sizes="32x32" href="{% static 'app/cws/images/favicon-32x32.png' %}">
    <link rel="icon" type="image/png" sizes="16x16" href="{% static 'app/cws/images/favicon-16x16.png' %}">
    <link rel="manifest" href="{% static 'app/cws/images/site.webmanifest' %}">
    <meta name="theme-color" content="#000000">
    <meta name="application-name" content="CWS" />
</head>

<body>
    <!-- Theme Toggle Button -->
    <button id="theme-toggle" class="btn btn-sm"
        style="position: absolute; top: 20px; right: 20px; z-index: 1000; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); backdrop-filter: blur(10px); color: inherit; border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.3s ease;">
        <i class="fas fa-moon" id="theme-icon"></i>
    </button>

    <div class="container d-flex justify-content-center align-items-center vh-100">
        <div class="login-box p-4 bg-white rounded shadow">
            <div class="text-center mb-4">
                <img class="logo" src="{% static 'app/cws/images/letra.png' %}" alt="CWS Logo">
                <h2>CARBAJAL WEB SERVICE</h2>
            </div>

            <form id="loginForm" method="POST" class="sign-in-form">
                {% csrf_token %}
                <div class="form-group">
                    <label for="username">Usuario</label>
                    <input type="text" class="form-control" id="username" name="username" placeholder="" required
                        autocomplete="off" autofocus onkeyup="return forceLower(this);">
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="text" class="form-control" id="password" name="password" required autocomplete="off"
                        onkeyup="return forceLower(this);">
                </div>
                <button type="submit" class="btn btn-primary btn-block">Ingresar</button>
            </form>

            <div class="text-center">
                <p class="footer-text">Ahora puedes acceder a TODAS tus aplicaciones desde un mismo sitio.</p>
            </div>

        </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.6.0.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.3/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>


    <script>
        function forceLower(strInput) {
            strInput.value = strInput.value.toLowerCase();
        }

        // Theme Toggle Logic
        const themeToggleBtn = document.getElementById('theme-toggle');
        const themeIcon = document.getElementById('theme-icon');
        const themeStylesheet = document.getElementById('theme-stylesheet');

        function updateThemeIcon() {
            const currentTheme = localStorage.getItem('cws_theme') || 'dark';
            if (currentTheme === 'light') {
                themeIcon.classList.remove('fa-moon');
                themeIcon.classList.add('fa-sun');
                themeToggleBtn.style.background = 'rgba(0,0,0,0.05)';
                themeToggleBtn.style.borderColor = 'rgba(0,0,0,0.1)';
                themeToggleBtn.style.color = '#334155';
            } else {
                themeIcon.classList.remove('fa-sun');
                themeIcon.classList.add('fa-moon');
                themeToggleBtn.style.background = 'rgba(255,255,255,0.1)';
                themeToggleBtn.style.borderColor = 'rgba(255,255,255,0.2)';
                themeToggleBtn.style.color = '#f8fafc';
            }
        }

        // Initialize icon on load
        updateThemeIcon();

        themeToggleBtn.addEventListener('click', () => {
            const currentTheme = localStorage.getItem('cws_theme') || 'dark';
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';

            // Update CSS
            themeStylesheet.setAttribute('href', newTheme === 'dark' ? darkThemeUrl : lightThemeUrl);

            // Save Preference
            localStorage.setItem('cws_theme', newTheme);

            // Update Icon
            updateThemeIcon();
        });
    </script>
    <script>
        $(document).ready(function () {
            var buttons = "Bfrtlip";

            var csrfToken = "{{ csrf_token }}";

            token = localStorage.setItem('jwtToken', '');

            console.log(token);

            $('#loginForm').submit(function (e) {
                e.preventDefault();

                var username = $('#username').val();
                var password = $('#password').val();

                Swal.fire({
                    title: '',
                    html: '<b>Validando Credenciales</b>',
                    didOpen: () => {
                        Swal.showLoading()
                    },
                    allowOutsideClick: false, // Evita que el usuario cierre el modal haciendo clic fuera de él
                    showConfirmButton: false // Oculta el botón de confirmación
                });

                $.ajax({
                    url: `{% url 'loginRequest' %}`,
                    type: "POST",
                    dataScr: 'data',
                    data: {
                        username: username,
                        password: password,
                        csrfmiddlewaretoken: csrfToken
                    },
                    dataType: "json",
                    success: function (data) {
                        Swal.close();

                        if (data.save == 1) {
                            if (data.account == 1) {
                                if (data.module == 1) {
                                    token = localStorage.setItem('jwtToken', data.token);

                                    Swal.fire("", "Ingresando al Sistema!", "success");

                                    window.location = "{% url 'modulos_aplicaciones' %}";
                                } else {
                                    Swal.fire("", "No tienes acceso al Sistema!", "warning");
                                }
                            } else {
                                Swal.fire("", "Usuario y/o Contraseña Incorrecta!", "warning");
                            }

                        } else {
                            Swal.fire("", "Error D: " + data.error, "error");
                        }

                    }
                });



            });

        });
    </script>
</body>

</html>
