    <script>
        $(document).ready(function () {
            $(".formattedMoneyInputs").inputmask("decimal", {
                radixPoint: ".",
                groupSeparator: ",",
                digits: 2,
                autoGroup: true,
                rightAlign: false,
                removeMaskOnSubmit: true,
            });

            var csrfToken = "{{ csrf_token }}";
            var user_id = "{{ user_id }}";
            var userName = "{{ userName }}";
            //AÑADIR EMPRESA

            localStorage.setItem('jwtToken', '{{token}}');


            $(document).on('click', '.btnAcceso', function () {
                varID = this.id;

                token = localStorage.getItem('jwtToken');

                if (varID == "btnDAC") {
                    urlRequest = "http://3.230.160.184/DAC/public/token";
                    urlLogin = "http://3.230.160.184/DAC/public/auto/login/";
                } else if (varID == "btnEVAC") {
                    urlRequest = "http://3.230.160.184/EVAC/public/token";
                    urlLogin = "http://3.230.160.184/EVAC/public/auto/login/";
                } else if (varID == "btnTICKETIT") {
                    urlRequest = "http://3.230.160.184/TICKETIT/public/token";
                    urlLogin = "http://3.230.160.184/TICKETIT/public/auto/login/";
                } else if (varID == "btnKANBAN") {
                    urlRequest = "http://3.230.160.184/TICKETIT/public/kanban/token";
                    urlLogin = "http://3.230.160.184/TICKETIT/public/kanban/auto/login/";
                }

                $.ajax({
                    url: urlRequest,
                    type: "POST",
                    dataSrc: 'data',
                    data: {
                        token: token,
                        csrfmiddlewaretoken: csrfToken
                    },
                    dataType: "json",
                    success: function (data) {

                        if (data.save == 1) {
                            if (data.modulo == 1) {
                                window.location = urlLogin + token;
                            } else {
                                Swal.fire("", "NO TIENES ACCESO A ESTA APLICACION!", "warning");
                            }
                        } else {
                            Swal.fire("", "Error: " + data.error, "error");
                        }

                    }
                });


            });



            $(document).on('click', '.clickedModule', function () {
                var modulo = $(this).closest('.clickedModule').find('.moduleValue').val();
                var url = $(this).closest('.clickedModule').find('.moduleUrl').val();
                var token = localStorage.getItem('jwtToken');

                $.ajax({
                    url: `{% url 'moduleRequest' %}`,
                    type: "POST",
                    dataSrc: 'data',
                    data: {
                        modulo: modulo,
                        user_id: user_id,
                        username: userName,
                        csrfmiddlewaretoken: csrfToken
                    },
                    dataType: "json",
                    success: function (data) {
                        Swal.close();
                        if (data.save == 1) {
                            if (data.module == 1) {
                                window.location = "/CWS/modulos/" + url;

                            } else {
                                Swal.fire("", "No tienes acceso al Modulo!", "warning");
                            }
                        } else {
                            Swal.fire("", "Error: " + data.error, "error");
                        }
                    }
                });
            });
        });
    </script>

    <!-- Theme Toggle Logic Script -->
    <script>
        const themeToggleBtn = document.getElementById('theme-toggle');
        const themeIcon = document.getElementById('theme-icon');
        const themeStylesheet = document.getElementById('theme-stylesheet');

        function updateThemeIcon() {
            const currentTheme = localStorage.getItem('cws_theme') || 'dark';
            const navbarUserTexts = document.querySelectorAll('.user-text h6');
            const navbarUserTextsAlt = document.querySelectorAll('.user-text-alt h6');

            if (currentTheme === 'light') {
                themeIcon.classList.remove('fa-moon');
                themeIcon.classList.add('fa-sun');
                themeToggleBtn.style.color = '#334155';
                navbarUserTexts.forEach(el => el.style.color = '#475569');
                navbarUserTextsAlt.forEach(el => el.style.color = '#f8fafc');
            } else {
                themeIcon.classList.remove('fa-sun');
                themeIcon.classList.add('fa-moon');
                themeToggleBtn.style.color = '#f8fafc';
                navbarUserTexts.forEach(el => el.style.color = '#f8fafc');
                navbarUserTextsAlt.forEach(el => el.style.color = '#475569');
            }
        }

        // Initialize icon on load
        if (themeToggleBtn) {
            updateThemeIcon();

            themeToggleBtn.addEventListener('click', () => {
                const currentTheme = localStorage.getItem('cws_theme') || 'dark';
                const newTheme = currentTheme === 'dark' ? 'light' : 'dark';

                // Update CSS
                themeStylesheet.setAttribute('href', newTheme === 'dark' ? darkThemeUrl : lightThemeUrl);

                // Save Preference
                localStorage.setItem('cws_theme', newTheme);

                // Update Icon
                updateThemeIcon();
            });
        }
    </script>
