{% extends 'componentes/menu_global_security.html' %}
{% load static %}

{% block title %}
GRUPOS DEL USUARIO
{% endblock %}


{% block body %}


<div class="container-fluid mt-1">
    <div class="card shadow-lg card-expanded p-3">

        <div class="row align-items-center justify-content-between">
            <div class="col-auto d-flex align-items-center">
                <button id="toggle-sidebar" class="hamburger btnMenu me-3" title="Mostrar/Ocultar Menu">
                    
                </button>
                <h4 class="page-title mb-0">GRUPOS DEL USUARIO</h4>
            </div>

            <div class="col-auto d-flex">
                <div class="d-flex flex-column align-items-start">
                    <label for="selectModulo" class="fw-bold">Módulos:</label>
                    <select id="selectModulo" class="form-select form-select-sm">
                        {% for m in modulos %}
                        <option value="{{ m.PKmodulo }}">{{ m.Nombre }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
        </div>

        <div class="row mt-3">

            <div class="col-lg-3">
                <div class="table-responsive shadow table-modulos-container bg-blanco" style="max-height: 400px;">
                    <table id="tableModulosUsuario"
                        class="table table-striped table-bordered mb-0 rounded-4 table-hover align-middle tabla-ajustada">
                        <thead class="bg-blanco text-dark">
                            <tr>
                                <th>Nombres</th>
                                <th>Módulos Usuario</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>

            <div class="col-lg-3">
                <div class="table-responsive shadow bg-blanco" style="max-height: 400px;">
                    <table id="tableGruposDisponibles"
                        class="table table-striped table-bordered mb-0 rounded-4 table-hover align-middle tabla-ajustada">
                        <thead class="bg-naranja text-dark">
                            <tr>
                                <th>Grupos Disponibles</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>

            <div class="col-lg-1 d-flex flex-column align-items-center justify-content-center">
                <button class="btn btn-primary btn-sm mb-2" style="width: 50px; height: 50px;" id="btnAgregar">
                    <i class="large material-icons">arrow_forward</i>
                </button>
                <button class="btn btn-secondary btn-sm" style="width: 50px; height: 50px;" id="btnQuitar">
                    <i class="large material-icons">arrow_back</i>
                </button>
            </div>

            <div class="col-lg-5">
                <div class="table-responsive shadow bg-blanco" style="max-height: 400px;">
                    <table id="tableGruposAsignados"
                        class="table table-striped table-bordered mb-0 rounded-4 table-hover align-middle tabla-ajustada">
                        <thead class="bg-naranja text-dark">
                            <tr>
                                <th>Nombres</th>
                                <th>Grupos Asignados</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>
</div>



<a href="{% url 'global_main' %}">
    <button class="btn btn-sm btn-danger" id="btnCerrar" title="Cerrar"
        style="position: fixed; bottom: 20px; right: 20px;">
        <i class="fa fa-times"></i> Cerrar
    </button>
</a>

{% endblock %}



{% block scripts %}
<script>
    $(document).ready(function () {

        var csrfToken = "{{ csrf_token }}";
        var tableFirmas, firma_id;

        var toastMixin = Swal.mixin({
            toast: true,
            icon: 'success',
            title: 'General Title',
            animation: false,
            position: 'top-right',
            showConfirmButton: false,
            timer: 2000,
            timerProgressBar: true,
            didOpen: (toast) => {
                toast.addEventListener('mouseenter', Swal.stopTimer);
                toast.addEventListener('mouseleave', Swal.resumeTimer);
            }
        });

        /* MENU ID Y SUBMENU ID */
        $('#usuariosMenu, #gruposUsuario_submenu').addClass('active');

        selectedUsuarioId = null;
        selectedGupoDisponibleId = null;
        selectedGrupoAsignadoId = null;
        id_modulo = null

        $('#selectModulo').change(function (e) {
            e.preventDefault();

            id_modulo = $(this).val();

            selectedGupoDisponibleId = null;
            selectedGrupoAsignadoId = null;

            getGruposDisponibles(selectedUsuarioId, id_modulo);
            getGruposAsignados(selectedUsuarioId, id_modulo);
        });



        function getGruposDisponibles(usuarioSeleccionado, moduloSeleccionado) {

            $("#tableGruposDisponibles").DataTable().clear().destroy();
            var cardHeight = $(".card-expanded").height();
            var tableHeight = cardHeight * 0.5;

            tableGruposDisponibles = $('#tableGruposDisponibles').DataTable({
                autoWidth: false,
                scrollX: true,
                scrollY: tableHeight + 'px',
                scrollCollapse: true,
                pageLength: 50,
                dom: 'rftip',
                language: {
                    url: "{% static 'app/th/json/es-ES.json' %}",
                },
                ajax: {
                    url: `{% url 'data_grupos_disponibles' %}`,
                    type: "POST",
                    dataSrc: 'data',
                    data: {
                        varUsuario: usuarioSeleccionado,
                        varModulo: moduloSeleccionado,
                        csrfmiddlewaretoken: csrfToken
                    },
                },
                colReorder: {
                    realtime: false,
                },
                buttons: [
                    {
                        extend: 'excel',
                        text: '<i class="fas fa-file-excel"></i>',
                        titleAttr: 'Exportar a Excel',
                        className: 'btn btn-success',
                    },
                    {
                        extend: 'pdf',
                        text: '<i class="fas fa-file-pdf"></i>',
                        titleAttr: 'Exportar a PDF',
                        className: 'btn btn-danger',
                    },
                    {
                        extend: 'print',
                        text: '<i class="fas fa-print"></i>',
                        titleAttr: 'Imprimir',
                        className: 'btn btn-primary',
                        orientation: 'landscape'
                    }
                ],
                columns: [
                    {
                        data: 'Nombres',
                    },
                ],
                order: [[0, "asc"]],
            });

        }

        $('#tableGruposDisponibles tbody').on('click', 'tr', function () {
            $('#tableGruposDisponibles tbody tr').removeClass('selected');

            $(this).addClass('selected');

            selectedGupoDisponibleId = tableGruposDisponibles.row(this).data().fkgrupo;
        });


        function getGruposAsignados(usuarioSeleccionado, moduloSeleccionado) {

            $("#tableGruposAsignados").DataTable().clear().destroy();
            var cardHeight = $(".card-expanded").height();
            var tableHeight = cardHeight * 0.5;

            tableGruposAsignados = $('#tableGruposAsignados').DataTable({
                autoWidth: false,
                scrollX: true,
                scrollY: tableHeight + 'px',
                scrollCollapse: true,
                pageLength: 50,
                dom: 'rftip',
                language: {
                    url: "{% static 'app/th/json/es-ES.json' %}",
                },
                ajax: {
                    url: `{% url 'data_grupos_asignados' %}`,
                    type: "POST",
                    dataSrc: 'data',
                    data: {
                        varUsuario: usuarioSeleccionado,
                        varModulo: moduloSeleccionado,
                        csrfmiddlewaretoken: csrfToken
                    },
                },
                colReorder: {
                    realtime: false,
                },
                buttons: [
                    {
                        extend: 'excel',
                        text: '<i class="fas fa-file-excel"></i>',
                        titleAttr: 'Exportar a Excel',
                        className: 'btn btn-success',
                    },
                    {
                        extend: 'pdf',
                        text: '<i class="fas fa-file-pdf"></i>',
                        titleAttr: 'Exportar a PDF',
                        className: 'btn btn-danger',
                    },
                    {
                        extend: 'print',
                        text: '<i class="fas fa-print"></i>',
                        titleAttr: 'Imprimir',
                        className: 'btn btn-primary',
                        orientation: 'landscape'
                    }
                ],
                columns: [
                    {
                        data: 'Nombres',
                    },
                    {
                        data: 'Descripcion',
                    },
                ],
                order: [[0, "asc"]],
            });

        }

        $('#tableGruposAsignados tbody').on('click', 'tr', function () {
            $('#tableGruposAsignados tbody tr').removeClass('selected');

            $(this).addClass('selected');

            selectedGrupoAsignadoId = tableGruposAsignados.row(this).data().fkgrupo;
        });

        getUsuarios()

        function getUsuarios() {

            $("#tableModulosUsuario").DataTable().clear().destroy();

            var cardHeight = $(".card-expanded").height();
            var tableHeight = cardHeight * 0.5;

            tableModulosUsuario = $('#tableModulosUsuario').DataTable({
                autoWidth: false,
                scrollX: true,
                scrollY: tableHeight + 'px',
                scrollCollapse: true,
                pageLength: 50,
                dom: 'rftip',
                language: {
                    url: "{% static 'app/th/json/es-ES.json' %}",
                },
                ajax: {
                    url: `{% url 'data_usuarios' %}`,
                    type: "POST",
                    dataSrc: 'data',
                    data: {
                        csrfmiddlewaretoken: csrfToken
                    },
                },
                colReorder: {
                    realtime: false,
                },
                buttons: [
                    {
                        extend: 'excel',
                        text: '<i class="fas fa-file-excel"></i>',
                        titleAttr: 'Exportar a Excel',
                        className: 'btn btn-success',
                    },
                    {
                        extend: 'pdf',
                        text: '<i class="fas fa-file-pdf"></i>',
                        titleAttr: 'Exportar a PDF',
                        className: 'btn btn-danger',
                    },
                    {
                        extend: 'print',
                        text: '<i class="fas fa-print"></i>',
                        titleAttr: 'Imprimir',
                        className: 'btn btn-primary',
                        orientation: 'landscape'
                    }
                ],
                columns: [
                    {
                        data: 'Nombre',
                    },
                    {
                        data: 'Usuario',
                    },

                ],
                order: [[1, "asc"]]
            });
        }

        $('#tableModulosUsuario tbody').on('click', 'tr', function () {
            $('#tableModulosUsuario tbody tr').removeClass('selected');

            $(this).addClass('selected');

            selectedUsuarioId = tableModulosUsuario.row(this).data().PKUsuario;
            id_modulo = $("#selectModulo").val();

            getGruposDisponibles(selectedUsuarioId, id_modulo);
            getGruposAsignados(selectedUsuarioId, id_modulo);
        });

        $('#btnAgregar').on('click', function () {
            asignar(selectedUsuarioId, selectedGupoDisponibleId)
        });

        $('#btnQuitar').on('click', function () {
            quitar(selectedUsuarioId, selectedGrupoAsignadoId)
        });

        function asignar(asignarUsuario, asignarGrupo) {

            if (asignarUsuario == null || asignarGrupo == null) {
                Swal.fire("", "Debes seleccionar un Usuario y Grupo Disponible!", "warning");
            } else {
                $.ajax({
                    url: "{% url 'insert_usuario_grupo' %}",
                    type: "POST",
                    data: {
                        varUsuario: asignarUsuario,
                        varGrupo: asignarGrupo,
                        csrfmiddlewaretoken: csrfToken
                    },
                    success: function (data) {
                        if (data.save == 1) {
                            toastMixin.fire({
                                animation: true,
                                title: 'Grupo Asignado!'
                            });

                            selectedGrupoAsignadoId = null
                            selectedGupoDisponibleId = null

                            tableGruposDisponibles.ajax.reload(null, false);
                            tableGruposAsignados.ajax.reload(null, false);
                        } else {
                            Swal.fire("", "Error D: " + data.error, "error");
                        }
                    }
                });
            }
        }

        function quitar(quitarUsuario, quitarGrupo) {

            if (quitarUsuario == null || quitarGrupo == null) {
                Swal.fire("", "Debes seleccionar un Usuario y Grupo Asignado!", "warning");
            } else {
                $.ajax({
                    url: "{% url 'eliminar_usuario_grupo' %}",
                    type: "POST",
                    data: {
                        varUsuario: quitarUsuario,
                        varGrupo: quitarGrupo,
                        csrfmiddlewaretoken: csrfToken
                    },
                    success: function (data) {
                        if (data.save == 1) {
                            toastMixin.fire({
                                animation: true,
                                title: 'Grupo Removido!'
                            });

                            selectedGrupoAsignadoId = null
                            selectedGupoDisponibleId = null

                            tableGruposDisponibles.ajax.reload(null, false);
                            tableGruposAsignados.ajax.reload(null, false);
                        } else {
                            Swal.fire("", "Error D: " + data.error, "error");
                        }
                    }
                });
            }
        }

    });

</script>

{% endblock %}
