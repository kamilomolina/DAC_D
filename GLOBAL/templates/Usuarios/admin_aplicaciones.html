{% extends 'componentes/menu_global_security.html' %}
{% load static %}

{% block title %}
ADMINISTRADOR DE APLICACIONES
{% endblock %}

{% block body %}

<div class="container-fluid mt-1">
    <div class="card shadow-lg card-expanded">

        <div class="row align-items-center justify-content-between">
            <div class="col-auto d-flex align-items-center">
                <button id="toggle-sidebar" class="hamburger btnMenu me-3" title="Mostrar/Ocultar Menu">
                    
                </button>
                <i class="material-icons d-block">person</i>
                <h4 class="page-title mb-0">ADMINISTRADOR DE APLICACIONES</h4>
            </div>

            <div class="col-auto d-flex">
                <div class="d-flex flex-column align-items-start">
                    <label for="selectModulo" class="fw-bold">Módulos:</label>
                    <select id="selectModulo" class="form-select form-select-sm">
                        {% for m in modulos %}
                        <option value="{{ m.PKmodulo }}">{{ m.Nombre }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
        </div>

        <div class="row mt-1 justify-content-center">
            <div class="col-lg-5 text-center">
                <label class="fw-bold">Usuarios Asignados</label>
                <div class="table-responsive shadow bg-blanco" style="max-height: 400px;">
                    <table id="tableUsuariosAdminAsignados"
                        class="table table-striped table-bordered mb-0 rounded-4 table-hover align-middle tabla-ajustada mx-auto">
                        <thead class="table-success text-dark">
                            <tr>
                                <th>Nombre</th>
                                <th>Usuario</th>
                            </tr>
                        </thead>
                        <tbody class="table-success text-dark"></tbody>
                    </table>
                </div>
            </div>

            <div class="col-lg-1 d-flex flex-column align-items-center my-4">
                <button id="BtnAgregar" class="btn btn-success btn-sm mb-2" style="width: 50px; height: 50px;">
                    <i class="large material-icons">arrow_back</i>
                </button>
                <button id="BtnQuitar" class="btn btn-danger btn-sm mb-2" style="width: 50px; height: 50px;">
                    <i class="large material-icons">arrow_forward</i>
                </button>
            </div>

            <div class="col-lg-5 text-center">
                <label class="fw-bold">Usuarios Disponibles</label>
                <div class="table-responsive shadow bg-blanco" style="max-height: 400px;">
                    <table id="tableModulosUsuario"
                        class="table table-striped table-bordered mb-0 rounded-4 table-hover align-middle tabla-ajustada mx-auto">
                        <thead class="table-danger text-dark">
                            <tr>
                                <th>Nombre</th>
                                <th>Usuario</th>
                            </tr>
                        </thead>
                        <tbody class="table-danger text-dark"></tbody>
                    </table>
                </div>
            </div>
        </div>

    </div>
</div>



<a href="{% url 'global_main' %}">
    <button class="btn btn-sm btn-danger" id="btnCerrar" title="Cerrar"
        style="position: fixed; bottom: 20px; right: 20px;">
        <i class="fa fa-times"></i> Cerrar
    </button>
</a>

{% endblock %}



{% block scripts %}
<script>
    $(document).ready(function () {

        var csrfToken = "{{ csrf_token }}";
        var tableFirmas, firma_id;

        var toastMixin = Swal.mixin({
            toast: true,
            icon: 'success',
            title: 'General Title',
            animation: false,
            position: 'top-right',
            showConfirmButton: false,
            timer: 2000,
            timerProgressBar: true,
            didOpen: (toast) => {
                toast.addEventListener('mouseenter', Swal.stopTimer);
                toast.addEventListener('mouseleave', Swal.resumeTimer);
            }
        });

        /* MENU ID Y SUBMENU ID */
        $('#usuariosMenu, #gruposUsuario_submenu').addClass('active');

        selectedUsuarioId = null;
        selectedUsuarioDisponibleId = null;
        selectedUsuarioAsignadoId = null;
        id_modulo = null

        $('#selectModulo').change(function (e) {
            e.preventDefault();

            id_modulo = $(this).val();
            getUsuariosDisponibles();
            getUsuariosAsignados();
        });


        getUsuariosAsignados();
        function getUsuariosAsignados() {

            $("#tableUsuariosAdminAsignados").DataTable().clear().destroy();
            id_modulo = $("#selectModulo").val();

            var cardHeight = $(".card-expanded").height();
            var tableHeight = cardHeight * 0.5;
            tableUsuariosAdminAsignados = $('#tableUsuariosAdminAsignados').DataTable({
                autoWidth: false,
                scrollX: true,
                scrollY: tableHeight + 'px',
                scrollCollapse: true,
                pageLength: 50,
                dom: 'rftip',
                language: {
                    url: "{% static 'app/th/json/es-ES.json' %}",
                },
                ajax: {
                    url: `{% url 'data_usuario_admin_asignados' %}`,
                    type: "POST",
                    dataSrc: 'data',
                    data: {

                        varModulo: id_modulo,
                        csrfmiddlewaretoken: csrfToken
                    },
                },
                colReorder: {
                    realtime: false,
                },
                buttons: [
                    {
                        extend: 'excel',
                        text: '<i class="fas fa-file-excel"></i>',
                        titleAttr: 'Exportar a Excel',
                        className: 'btn btn-success',
                    },
                    {
                        extend: 'pdf',
                        text: '<i class="fas fa-file-pdf"></i>',
                        titleAttr: 'Exportar a PDF',
                        className: 'btn btn-danger',
                    },
                    {
                        extend: 'print',
                        text: '<i class="fas fa-print"></i>',
                        titleAttr: 'Imprimir',
                        className: 'btn btn-primary',
                        orientation: 'landscape'
                    }
                ],
                columns: [
                    {
                        data: 'Nombres',
                    },
                    {
                        data: 'Usuario',
                    },
                ],
                order: [[0, "asc"]],
            });

        }

        $('#tableUsuariosAdminAsignados tbody').on('click', 'tr', function () {
            $('#tableUsuariosAdminAsignados tbody tr').removeClass('selected');

            $(this).addClass('selected');

            selectedUsuarioAsignadoId = tableUsuariosAdminAsignados.row(this).data().fkUsuario;
        });


        getUsuariosDisponibles()

        function getUsuariosDisponibles() {

            var cardHeight = $(".card-expanded").height();
            var tableHeight = cardHeight * 0.5;

            $("#tableModulosUsuario").DataTable().clear().destroy();
            id_modulo = $("#selectModulo").val();
            tableModulosUsuario = $('#tableModulosUsuario').DataTable({
                autoWidth: false,
                scrollX: true,
                scrollY: tableHeight + 'px',
                scrollCollapse: true,
                pageLength: 50,
                dom: 'rftip',
                language: {
                    url: "{% static 'app/th/json/es-ES.json' %}",
                },
                ajax: {
                    url: `{% url 'data_usuario_admin_disponibles' %}`,
                    type: "POST",
                    dataSrc: 'data',
                    data: {
                        varModulo: id_modulo,
                        csrfmiddlewaretoken: csrfToken
                    },
                },
                colReorder: {
                    realtime: false,
                },
                buttons: [
                    {
                        extend: 'excel',
                        text: '<i class="fas fa-file-excel"></i>',
                        titleAttr: 'Exportar a Excel',
                        className: 'btn btn-success',
                    },
                    {
                        extend: 'pdf',
                        text: '<i class="fas fa-file-pdf"></i>',
                        titleAttr: 'Exportar a PDF',
                        className: 'btn btn-danger',
                    },
                    {
                        extend: 'print',
                        text: '<i class="fas fa-print"></i>',
                        titleAttr: 'Imprimir',
                        className: 'btn btn-primary',
                        orientation: 'landscape'
                    }
                ],
                columns: [
                    {
                        data: 'Nombres',
                    },
                    {
                        data: 'Usuario',
                    },

                ],
                order: [[1, "asc"]]
            });
        }

        $('#tableModulosUsuario tbody').on('click', 'tr', function () {
            $('#tableModulosUsuario tbody tr').removeClass('selected');

            $(this).addClass('selected');

            selectedUsuarioDisponibleId = tableModulosUsuario.row(this).data().fkUsuario;

        });

        $('#BtnAgregar').on('click', function () {
            asignarUsuario();
        });
        $('#BtnQuitar').on('click', function () {
            quitarAccion();
        });

        function asignarUsuario() {
            let usuario_id = selectedUsuarioDisponibleId;
            let modulo_id = $("#selectModulo").val();
            // Validar que se haya seleccionado un modulo
            if (!selectedUsuarioDisponibleId) {
                alert("Por favor, seleccione un usuario DISPONIBLE.");
                return;  // Detener la ejecución si no hay módulo seleccionado
            }
            $.post("{% url 'asignar_usuarios_admin' %}", {
                usuario_id: usuario_id,
                modulo_id: modulo_id,
                csrfmiddlewaretoken: "{{ csrf_token }}"
            }, function (response) {
                if (response.status === "success") {
                    toastMixin.fire({
                        icon: 'success',
                        title: 'Usuario agregado correctamente.'
                    });
                    getUsuariosAsignados();
                    getUsuariosDisponibles();
                } else {
                    alert(response.message);
                }
            });
        }

        function quitarAccion() {
            let usuario_id = selectedUsuarioAsignadoId;
            let modulo_id = $("#selectModulo").val();
            // Validar que se haya seleccionado un modulo
            if (!selectedUsuarioAsignadoId) {
                alert("Por favor, seleccione un usuario ASIGNADO.");
                return;  // Detener la ejecución si no hay módulo seleccionado
            }
            $.post("{% url 'quitar_usuarios_admin' %}", {
                usuario_id: usuario_id,
                modulo_id: modulo_id,
                csrfmiddlewaretoken: "{{ csrf_token }}"
            }, function (response) {
                if (response.status === "success") {
                    toastMixin.fire({
                        icon: 'success',
                        title: 'Usuario quitado correctamente.'
                    });
                    getUsuariosAsignados();
                    getUsuariosDisponibles();
                } else {
                    alert(response.message);
                }
            });
        }

    });

</script>

{% endblock %}
