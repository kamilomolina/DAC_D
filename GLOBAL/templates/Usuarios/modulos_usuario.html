{% extends 'componentes/menu_global_security.html' %}
{% load static %}

{% block title %}
MODULOS DEL USUARIO
{% endblock %}


{% block body %}


<div class="container-fluid mt-1">

    <div class="card shadow-lg card-expanded">
        <div class="row align-items-center">
            <div class="col d-flex align-items-center">
                <button id="toggle-sidebar" class="me-3" title="Mostrar/Ocultar Menu">
                </button>
                <i class="material-icons d-block">person</i>
                <h4 class="page-title mb-0">MODULOS DEL USUARIO</h4>
            </div>
        </div>

        <div class="container-fluid pt-1">
            <div class="row mt-3">
                <div class="row d-flex align-items-start justify-content-between">
                    <div class="col-3">
                        <label class="me-2">COLABORADORES</label>
                        <div class="table-responsive  shadow  bg-blanco ">
                            <table id="tableModulosUsuario"
                                class="table table-striped table-bordered mb-0 table-sm rounded-4 table-hover align-middle ">
                                <thead class="bg-blanco text-dark">
                                    <tr>
                                        <th>Nombre</th>
                                        <th>Usuario</th>
                                    </tr>
                                </thead>
                                <tbody>
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <div class="col-lg-4">
                        <label class="me-2">MÓDULOS ASIGNADOS</label>
                        <div class="table-responsive  shadow bg-blanco ">
                            <table id="tableModulosAsignados"
                                class="table table-striped table-bordered mb-0 table-sm rounded-4 table-hover align-middle ">
                                <thead class="table-success text-dark">
                                    <tr>
                                        <th>Nombre</th>
                                        <th>Descripción</th>
                                    </tr>
                                </thead>
                                <tbody class="table-success text-dark">
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <div class="col-lg-1 d-flex flex-column align-items-center my-4">
                        <button id="BtnAgregar" class="btn btn-success btn-sm mb-2" style="width: 50px; height: 50px;">
                            <i class="large material-icons">arrow_back</i>
                        </button>
                        <button id="BtnQuitar" class="btn btn-danger btn-sm mb-2" style="width: 50px; height: 50px;">
                            <i class="large material-icons">arrow_forward</i>
                        </button>
                    </div>

                    <div class="col-lg-4">
                        <label class="me-2">MÓDULOS DISPONIBLES</label>
                        <div class="table-responsive  shadow bg-blanco ">
                            <table id="tableModulosDisponibles"
                                class="table table-striped table-bordered mb-0 table-sm rounded-4 table-hover align-middle ">
                                <thead class="table-danger text-dark">
                                    <tr>
                                        <th>Nombre</th>
                                        <th>Descripción</th>
                                    </tr>
                                </thead>
                                <tbody class="table-danger text-dark">
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>



<a href="{% url 'global_main' %}">
    <button class="btn btn-sm btn-danger" id="btnCerrar" title="Cerrar"
        style="position: fixed; bottom: 20px; right: 20px;">
        <i class="fa fa-times"></i> Cerrar
    </button>
</a>

{% endblock %}



{% block scripts %}
<script>
    $(document).ready(function () {

        var csrfToken = "{{ csrf_token }}";
        var tableFirmas, firma_id;

        var toastMixin = Swal.mixin({
            toast: true,
            icon: 'success',
            title: 'General Title',
            animation: false,
            position: 'top-right',
            showConfirmButton: false,
            timer: 2000,
            timerProgressBar: true,
            didOpen: (toast) => {
                toast.addEventListener('mouseenter', Swal.stopTimer);
                toast.addEventListener('mouseleave', Swal.resumeTimer);
            }
        });

        /* MENU ID Y SUBMENU ID */
        $('#usuariosMenu, #gruposUsuario_submenu').addClass('active');

        selectedUsuarioId = null;
        selectedGupoDisponibleId = null;
        selectedGrupoAsignadoId = null;
        id_moduloA = null
        id_moduloB = null

        function getModulosDisponibles(usuarioSeleccionado) {

            $("#tableModulosDisponibles").DataTable().clear().destroy();

            var cardHeight = $(".card-expanded").height();
            var tableHeight = cardHeight * 0.5;

            tableModulosDisponibles = $('#tableModulosDisponibles').DataTable({
                autoWidth: false,
                scrollX: true,
                scrollY: tableHeight + 'px',
                scrollCollapse: true,
                pageLength: 50,
                dom: 'rftip',
                language: {
                    url: "{% static 'app/th/json/es-ES.json' %}",
                },
                ajax: {
                    url: `{% url 'data_modulos_disponibles' %}`,
                    type: "POST",
                    dataSrc: 'data',
                    data: {
                        varUsuario: usuarioSeleccionado,

                        csrfmiddlewaretoken: csrfToken
                    },
                },
                colReorder: {
                    realtime: false,
                },
                buttons: [
                    {
                        extend: 'excel',
                        text: '<i class="fas fa-file-excel"></i>',
                        titleAttr: 'Exportar a Excel',
                        className: 'btn btn-success',
                    },
                    {
                        extend: 'pdf',
                        text: '<i class="fas fa-file-pdf"></i>',
                        titleAttr: 'Exportar a PDF',
                        className: 'btn btn-danger',
                    },
                    {
                        extend: 'print',
                        text: '<i class="fas fa-print"></i>',
                        titleAttr: 'Imprimir',
                        className: 'btn btn-primary',
                        orientation: 'landscape'
                    }
                ],
                columns: [
                    {
                        data: 'Nombres',
                    },
                    {
                        data: 'Descripcion',
                    },
                ],
                order: [[0, "asc"]],
            });

        }

        $('#tableModulosDisponibles tbody').on('click', 'tr', function () {
            $('#tableModulosDisponibles tbody tr').removeClass('selected');

            $(this).addClass('selected');


            id_moduloB = tableModulosDisponibles.row(this).data().fkModulo;

        });


        function getModulosAsignados(usuarioSeleccionado) {

            $("#tableModulosAsignados").DataTable().clear().destroy();
            var cardHeight = $(".card-expanded").height();
            var tableHeight = cardHeight * 0.5;

            tableModulosAsignados = $('#tableModulosAsignados').DataTable({
                autoWidth: false,
                scrollX: true,
                scrollY: tableHeight + 'px',
                scrollCollapse: true,
                pageLength: 50,
                dom: 'rftip',
                language: {
                    url: "{% static 'app/th/json/es-ES.json' %}",
                },
                ajax: {
                    url: `{% url 'data_modulos_asignados' %}`,
                    type: "POST",
                    dataSrc: 'data',
                    data: {
                        varUsuario: usuarioSeleccionado,

                        csrfmiddlewaretoken: csrfToken
                    },
                },
                colReorder: {
                    realtime: false,
                },
                buttons: [
                    {
                        extend: 'excel',
                        text: '<i class="fas fa-file-excel"></i>',
                        titleAttr: 'Exportar a Excel',
                        className: 'btn btn-success',
                    },
                    {
                        extend: 'pdf',
                        text: '<i class="fas fa-file-pdf"></i>',
                        titleAttr: 'Exportar a PDF',
                        className: 'btn btn-danger',
                    },
                    {
                        extend: 'print',
                        text: '<i class="fas fa-print"></i>',
                        titleAttr: 'Imprimir',
                        className: 'btn btn-primary',
                        orientation: 'landscape'
                    }
                ],
                columns: [
                    {
                        data: 'Nombres',
                    },
                    {
                        data: 'Descripcion',
                    },
                ],
                order: [[0, "asc"]],
            });

        }

        $('#tableModulosAsignados tbody').on('click', 'tr', function () {
            $('#tableModulosAsignados tbody tr').removeClass('selected');

            $(this).addClass('selected');


            id_moduloA = tableModulosAsignados.row(this).data().fkModulo;

        });

        getUsuarios()

        function getUsuarios() {

            $("#tableModulosUsuario").DataTable().clear().destroy();
            var cardHeight = $(".card-expanded").height();
            var tableHeight = cardHeight * 0.5;

            tableModulosUsuario = $('#tableModulosUsuario').DataTable({
                autoWidth: false,
                scrollX: true,
                scrollY: tableHeight + 'px',
                scrollCollapse: true,
                pageLength: 50,
                dom: 'rftip',
                language: {
                    url: "{% static 'app/th/json/es-ES.json' %}",
                },
                ajax: {
                    url: `{% url 'data_usuarios' %}`,
                    type: "POST",
                    dataSrc: 'data',
                    data: {
                        csrfmiddlewaretoken: csrfToken
                    },
                },
                colReorder: {
                    realtime: false,
                },
                buttons: [
                    {
                        extend: 'excel',
                        text: '<i class="fas fa-file-excel"></i>',
                        titleAttr: 'Exportar a Excel',
                        className: 'btn btn-success',
                    },
                    {
                        extend: 'pdf',
                        text: '<i class="fas fa-file-pdf"></i>',
                        titleAttr: 'Exportar a PDF',
                        className: 'btn btn-danger',
                    },
                    {
                        extend: 'print',
                        text: '<i class="fas fa-print"></i>',
                        titleAttr: 'Imprimir',
                        className: 'btn btn-primary',
                        orientation: 'landscape'
                    }
                ],
                columns: [
                    {
                        data: 'Nombre',
                    },
                    {
                        data: 'Usuario',
                    },

                ],
                order: [[1, "asc"]]
            });
        }

        $('#tableModulosUsuario tbody').on('click', 'tr', function () {
            $('#tableModulosUsuario tbody tr').removeClass('selected');

            $(this).addClass('selected');

            selectedUsuarioId = tableModulosUsuario.row(this).data().PKUsuario;


            getModulosDisponibles(selectedUsuarioId);
            getModulosAsignados(selectedUsuarioId);
        });

        $('#BtnAgregar').on('click', function () {
            asignarModulo();
        });
        $('#BtnQuitar').on('click', function () {
            quitarModulo();
        });

        function asignarModulo() {
            let usuario_id = selectedUsuarioId;
            let modulo_idB = id_moduloB;
            // Validar que se haya seleccionado un modulo
            if (!modulo_idB) {
                alert("Por favor, seleccione un módulo.");
                return;  // Detener la ejecución si no hay módulo seleccionado
            }
            $.post("{% url 'asignar_modulo' %}", {
                usuario_id: usuario_id,
                modulo_id: modulo_idB,
                csrfmiddlewaretoken: "{{ csrf_token }}"
            }, function (response) {
                if (response.status === "success") {
                    getModulosDisponibles(usuario_id);
                    getModulosAsignados(usuario_id);
                    toastMixin.fire({
                        icon: 'success',
                        title: 'Módulo agregado correctamente.'
                    });
                } else {
                    alert(response.message);
                }
            });
        }

        function quitarModulo() {
            let usuario_id = selectedUsuarioId;
            let modulo_idA = id_moduloA;
            // Validar que se haya seleccionado un modulo
            if (!modulo_idA) {
                alert("Por favor, seleccione un módulo.");
                return;  // Detener la ejecución si no hay módulo seleccionado
            }
            $.post("{% url 'quitar_modulo' %}", {
                usuario_id: usuario_id,
                modulo_id: modulo_idA,
                csrfmiddlewaretoken: "{{ csrf_token }}"
            }, function (response) {
                if (response.status === "success") {
                    getModulosDisponibles(usuario_id);
                    getModulosAsignados(usuario_id);
                    toastMixin.fire({
                        icon: 'success',
                        title: 'Módulo quitado correctamente.'
                    });
                } else {
                    alert(response.message);
                }
            });
        }

    });



</script>
{% endblock %}
