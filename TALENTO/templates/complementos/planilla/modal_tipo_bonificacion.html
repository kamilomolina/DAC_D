<!-- Modal para crear Bonificaciones -->
<div class="modal fade" id="modalCrearBonificacionTipo" tabindex="-1" role="dialog"
    aria-labelledby="modalCrearBonificacionLabel" data-bs-keyboard="false" data-bs-backdrop="static" aria-hidden="true">
    <div class="modal-dialog" role="document">
        <div class="modal-content">
            <!-- Encabezado del Modal -->
            <div class="modal-header" style="background-color: #304458; color:white">
                <h5 class="modal-title" id="modalCrearBonificacionLabel">Crear Nueva Bonificación</h5>
                <button type="button" class="close-nueva-bonificacion" data-dismiss="modal" aria-label="close-modal">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>

            <!-- Cuerpo del Modal -->
            <div class="modal-body">
                <!-- Contenido del formulario para crear la bonificación -->
                <form id="formCrearBonificacionTipo">

                    <div class="col-md-12 mb-3">
                        <div class="form-group">
                            <label for="descripcion-bonificacion">Nombre de la Bonificación:</label>
                            <input type="text" class="form-control" id="descripcion-bonificacion">
                        </div>
                    </div>

                    <div class="col-md-12 mb-3">
                        <label for="usa_cuentas_x_centro" class="form-label me-2 mb-0">
                            <span class="text-danger">*</span> Usa Cuenta Contable por Centros:
                        </label>
                        <select id="usa_cuentas_x_centro" name="usa_cuentas_x_centro" class="form-select" required>
                            <option value="0">NO APLICA</option>
                            <option value="1">APLICA</option>
                        </select>
                    </div>

                    <div class="col-md-12 mb-3">
                        <label for="codigo_cuenta" class="form-label me-2 mb-0">
                            <span class="text-danger">*</span> Cuenta Contable:
                        </label>

                        <div class="input-group">
                            <input type="text" id="codigo_cuenta" name="codigo_cuenta"
                                class="form-control form-control-sm" readonly required>

                            <button type="button" class="btn btn-outline-primary btnBuscarCuentaGeneral">
                                <i class="fas fa-search"></i>
                            </button>
                        </div>
                    </div>

                    <div class="modal-footer">
                        <button type="submit"
                            class="btn btn-success animate__animated animate__pulse animate__slow animate__infinite">Guardar</button>
                        <button type="button" class="btn btn-danger close-nueva-bonificacion"
                            data-dismiss="modal">Cerrar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
