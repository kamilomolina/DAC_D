<!-- ================================
     MODAL DETALLE CONTABLE PLANILLA
================================== -->
<div class="modal fade" id="modalDetalleContable" tabindex="-1" aria-labelledby="modalDetalleContableLabel" aria-hidden="true">
    <div class="modal-dialog modal-fullscreen">
        <div class="modal-content">

            <!-- HEADER -->
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title" id="modalDetalleContableLabel">
                    DETALLE CONTABLE PLANILLA
                </h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>

            <!-- BODY -->
            <div class="modal-body p-3">

                <div class="table-responsive">
                    <table id="detalleContableTable"
                           class="table table-striped table-bordered table-hover w-100">

                        <thead class="table-light">
                            <tr>
                                <th class="text-center">#</th>
                                <th>Identidad</th>
                                <th>Empleado</th>
                                <th>Código Cuenta</th>
                                <th>Nombre Cuenta</th>
                                <th class="text-end">Debe</th>
                                <th class="text-end">Haber</th>
                            </tr>
                        </thead>

                        <tbody>
                            <!-- DataTable -->
                        </tbody>

                        <!-- FOOTER DE TOTALES -->
                        <tfoot>
                            <tr>
                                <th colspan="5" class="text-end">Totales:</th>
                                <th class="text-end" id="totalDebeContable">0.00</th>
                                <th class="text-end" id="totalHaberContable">0.00</th>
                            </tr>
                            <tr>
                                <th colspan="6" class="text-end">Balance:</th>
                                <th class="text-end">
                                    <span id="balanceContable" class="fw-bold">0.00</span>
                                </th>
                            </tr>
                        </tfoot>

                    </table>
                </div>

            </div>

            <!-- FOOTER -->
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                    Cerrar
                </button>
            </div>

        </div>
    </div>
</div>
