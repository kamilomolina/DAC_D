<div class="modal fade" id="modalCuentasContablesOrden" tabindex="-1" role="dialog"
    aria-labelledby="modalCuentasContablesOrdenLabel" aria-hidden="true" data-bs-keyboard="false"
    data-bs-backdrop="static">
    <div class="modal-dialog modal-fullscreen">
        <div class="modal-content">
            <div class="modal-header" style="background-color: #4d4e2a; color: white;">
                <h5 class="modal-title text-white fw-bold" id="modalCuentasContablesOrdenLabel" style="color: #525252;">
                    LISTADO DE
                    CUENTAS CONTABLES</h5>
                <button type="button" class="close" data-bs-dismiss="modal" aria-label="Close"><span
                        aria-hidden="true">&times;</span></button>
            </div>

            <div class="modal-body" id="modal-body-cuentas">

                <div class="row">
                    <div class="col-lg-4">
                        <label for="clasificacion">Codigo:</label>
                        <input type="text" class="form-control form-control-sm" id="filterOrdenCodigo"
                            name="filterOrdenCodigo">
                    </div>
                    <div class="col-lg-4">
                        <label for="clasificacion">Cuenta:</label>
                        <input type="text" class="form-control form-control-sm" id="filterOrdenCuenta"
                            name="filterOrdenCuenta">
                    </div>
                    <div class="col-lg-4">
                        <label for="cuentaBase">Cuenta Base:</label>
                        <select class="form-select form-select-sm" id="filterOrdenTipo" name="filterOrdenTipo" required>
                            <option value="">Seleccione la cuenta base</option>
                            {% for tipo in cuentas_bases %}
                            <option value="{{ tipo.1 }}">{{ tipo.1 }}</option>
                            {% endfor %}
                        </select>
                        <!-- <label for="clasificacion">Tipo:</label>
                        <input type="text" class="form-control form-control-sm" id="filterOrdenTipo" name="filterOrdenTipo"> -->
                    </div>
                </div>

                <div class="row mt-2">
                    <div class="table-responsive">
                        <table id="cuentasContablesOrdenLogicoTable"
                            class="table table-striped table-bordered mb-0 table-sm rounded-4 table-hover align-middle"
                            style="width: 100%;">
                            <thead class="table-gradient text-dark ">
                                <tr>
                                    <th>Codigo Cuenta</th>
                                    <th>Concepto Cuenta</th>
                                    <th>Tipo</th>
                                </tr>
                            </thead>
                            <tbody>
                            </tbody>
                        </table>
                    </div>
                </div>

            </div>

            <div class="modal-footer">
                <button type="button" class="btn btn-danger btn-sm" data-bs-dismiss="modal">Cerrar</button>
            </div>


        </div>
    </div>
</div>
