<div class="modal fade" id="modalTiposPartidas" tabindex="-1" aria-labelledby="modalTiposPartidasLabel"
    aria-hidden="true" data-bs-keyboard="false" data-bs-backdrop="static">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header" style="background-color: #feffd6; color: white;">
                <h5 class="modal-title" id="modalTiposPartidasLabel" style="color: #525252;">
                    <i class="material-icons me-2 text-gray">settings</i> Tipo de Partida Automática
                </h5>
                <button type="button" class="close" data-bs-dismiss="modal" aria-label="Close"><span
                        aria-hidden="true">&times;</span></button>
            </div>

            <form id="formTiposPartidas">
                
                <div class="modal-body">

                    <div class="row">
                        <div class="col-lg-4">
                            <div class="form-group">
                                <label for="codigo">Código:</label>
                                <input type="text" class="form-control form-control-sm" id="codigo" maxlength="3"
                                    name="codigo">
                            </div>
                        </div>

                        <div class="col-lg-4">
                            <div class="form-group">
                                <label for="manual_automatica">Manual/Automatica:</label>
                                <select class="form-select form-select-sm" id="manual_automatica" name="manual_automatica">
                                    <option value="0">AUTOMATICA</option>
                                    <option value="1">MANUAL</option>
                                </select>
                            </div>
                        </div>

                        <div class="col-lg-4">
                            <div class="form-group">
                                <label for="sistema">Sistema:</label>
                                <select class="form-select form-select-sm" id="sistema" name="sistema">
                                    <option value="0">Seleccione un Sistema</option>
                                    {% for m in modulosData %}
                                    <option value="{{m.id}}">{{m.modulo}}</option>
                                    {% endfor %}
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-lg-12">
                            <div class="form-group">
                                <label for="nombre">Nombre Partida:</label>
                                <input type="text" class="form-control form-control-sm" id="nombre" name="nombre">
                            </div>
                        </div>
                    </div>

                    <div class="row">

                        <div class="col-lg-6">
                            <div class="form-group">
                                <label for="partida_hermana">Partida Fuente:</label>
                                <select class="form-select form-select-sm" id="partida_hermana" name="partida_hermana">
                                    <option value="0">NO APLICA</option>
                                    {% for h in hermanasData %}
                                    <option value="{{h.id_hermana}}">{{h.nombre}}</option>
                                    {% endfor %}
                                </select>
                            </div>
                        </div>

                        <div class="col-lg-6">
                            <div class="form-group">
                                <label for="partida_origen">Partida Origen:</label>
                                <select class="form-select form-select-sm" id="partida_origen" name="partida_origen"
                                    disabled>
                                    <option value="0">Seleccione Partida Origen</option>

                                </select>
                            </div>
                        </div>

                    </div>



                    <div class="col-lg-12">
                        <div class="form-group">
                            <label for="notas">Notas:</label>
                            <textarea class="form-control form-control-sm" id="notas" name="notas" rows="2"
                                placeholder="Notas..."></textarea>
                        </div>
                    </div>


                </div>

                <div class="modal-footer">
                    <button type="submit" class="btn btn-success btn-sm">Guardar</button>
                    <button type="button" class="btn btn-danger btn-sm" data-bs-dismiss="modal">Cerrar</button>
                </div>
            </form>
        </div>
    </div>
</div>
