<div class="modal fade" id="modalDetallesTiposPartidas" tabindex="-1" aria-labelledby="modalDetallesTiposPartidasLabel"
    aria-hidden="true" data-bs-keyboard="false" data-bs-backdrop="static">
    <div class="modal-dialog modal-fullscreen">
        <div class="modal-content">
            <div class="modal-header" style="background-color: #feffd6; color: white;">
                <h5 class="modal-title" id="modalDetallesTiposPartidasLabel" style="color: #525252;">
                    <i class="material-icons me-2 text-gray">settings</i> Detalles Tipo de Partida Automática
                </h5>
                <button type="button" class="close" data-bs-dismiss="modal" aria-label="Close"><span
                        aria-hidden="true">&times;</span></button>
            </div>

            <div class="modal-body">

                <div class="row mb-2" id="msgPartidaBloqueada" style="display:none;">
                    <div class="col-12">
                        <div class="alert alert-warning d-flex align-items-center mb-0">
                            <i class="fas fa-lock me-2"></i>
                            <strong class="me-1">Partida Revisada.</strong>
                            No Puedes Modificarla. Comunícate Con IT.
                        </div>
                    </div>
                </div>

                <form class="form" id="formDetallesTipoPartidas" style="display:none;">

                    <div class="row">

                        <div class="col-lg-3">
                            <div class="form-group">
                                <label for="detalle_cuenta">Cuenta Contable:</label>
                                <select class="form-select form-select-sm codigo-select" id="detalle_cuenta"
                                    name="detalle_cuenta">
                                    <option value="0">Seleccione una Cuenta</option>
                                    {% for cta in cuentasData %}
                                    <option value="{{cta.CodigoCuenta}}">{{ cta.CodigoCuenta }} - {{ cta.Concepto }}
                                    </option>
                                    {% endfor %}
                                </select>
                            </div>
                        </div>

                        <div class="col-lg-3">
                            <div class="form-group">
                                <label for="detalle_tipo_movimiento">Tipo Movimiento:</label>
                                <select class="form-select form-select-sm" id="detalle_tipo_movimiento"
                                    name="detalle_tipo_movimiento">
                                    <option value="0">Seleccione un Tipo</option>
                                    <option value="DEBE">DEBE</option>
                                    <option value="HABER">HABER</option>
                                </select>
                            </div>
                        </div>

                        <div class="col-lg-3">
                            <div class="form-group">
                                <label for="detalle_valor_prueba">Valor Prueba:</label>
                                <input type="text" class="form-control form-control-sm formattedMoneyInputs"
                                    id="detalle_valor_prueba" name="detalle_valor_prueba" placeholder="0.00">
                            </div>
                        </div>


                        <div class="col-lg-3">
                            <div class="form-group">
                                <label for="detalle_formula">Formula:</label>
                                <input type="text" class="form-control form-control-sm" id="detalle_formula"
                                    name="detalle_formula" {% if adminIT == 0 or adminIT == '0' %} readonly {% endif %}>
                            </div>
                        </div>


                        <div class="col-lg-12">
                            <div class="form-group">
                                <label for="detalle_descripcion">Descripcion:</label>
                                <textarea class="form-control form-control-sm" id="detalle_descripcion"
                                    name="detalle_descripcion" rows="2" placeholder="Descripcion..."></textarea>
                            </div>
                        </div>

                    </div>

                    <div class="row mt-2">
                        <div class="col-12 d-flex justify-content-end">
                            <button type="submit" class="btn btn-success btn-sm me-2">Guardar</button>
                            <button type="button" class="btn btn-danger btn-sm"
                                data-bs-dismiss="modal">Cancelar</button>
                        </div>
                    </div>

                </form>

                <br>

                <div class="row">
                    <div class="table-responsive">

                        <div class="table-responsive">
                            <table id="detallesTiposPartidas_Table"
                                class="table table-striped table-bordered mb-0 table-sm rounded-4 table-hover"
                                style="width: 100%;">
                                <thead class="table-light">
                                    <tr>
                                        <th class="text-center">Código</th>
                                        <th class="text-start">Cuenta</th>
                                        <th class="text'center">Descripción</th>
                                        <th class="text'center">Tipo Movimiento</th>
                                        <th class="text-end">Debe</th>
                                        <th class="text-end">Haber</th>
                                        <th class="text-center">Fórmula</th>
                                        <th class="text-center">Estado</th>
                                        <th class="text-center">Acciones</th>
                                    </tr>
                                </thead>
                                <tfoot class="table-secondary fw-bold">
                                    <tr>
                                        <td colspan="4" class="text-end">Totales:</td>
                                        <td id="totalDebeContable" class="text-end currency">0.00</td>
                                        <td id="totalHaberContable" class="text-end currency">0.00</td>
                                        <td colspan="3"></td>
                                    </tr>
                                </tfoot>
                                <tbody>

                                </tbody>
                            </table>
                        </div>

                        <div class="row mt-2">
                            <div class="col d-flex justify-content-end">
                                <p class="fw-bold">Balance: L <span id="balanceContable" class="ms-1">0.00</span></p>
                            </div>
                        </div>

                    </div>
                </div>

            </div>

            <div class="modal-footer">
                <button type="button" class="btn btn-danger btn-sm" data-bs-dismiss="modal">Cerrar</button>
            </div>

        </div>
    </div>
</div>
