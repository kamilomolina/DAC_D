<div class="modal fade" id="modalCrearCuenta" tabindex="-1" role="dialog" aria-labelledby="modalCrearCuentaLabel"
    aria-hidden="true" data-bs-keyboard="false" data-bs-backdrop="static">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header" style="background-color: #263626; color: white;">
                <h5 class="modal-title text-white fw-bold" id="modalCrearCuentaLabel" style="color: #525252;">Crear
                    Cuenta Contable</h5>
                <button type="button" class="close" data-bs-dismiss="modal" aria-label="Close"><span
                        aria-hidden="true">&times;</span></button>
            </div>

            <form id="formCrearCuenta">

                <div class="modal-body">

                    <!-- <row class="row mb-3">
                        <div class="col-md-12">
                            <label for="">Empresa:</label>
                            <select id="cuenta_empresa" class="form-select form-select-sm" name="cuenta_empresa">
                                {% for e in empresasData %}
                                <option value="{{ e.id }}">{{ e.nombre }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </row> -->

                    <input type="hidden" id="cuenta_empresa">

                    <!-- Fila 1: Cuenta Base y Tipo Saldo -->
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="cuentaBase">Cuenta Base:</label>
                            <select class="form-select form-select-sm" id="cuentaBase" name="cuenta_base" required>
                                <option value="" selected disabled>Seleccione la cuenta base</option>
                                {% for tipo in cuentas_bases %}
                                <option value="{{ tipo.0 }}">{{ tipo.1 }}</option>
                                {% endfor %}
                            </select>
                            <!-- <label class="form-check-label me-2">Crear Todos los Centros</label>
                            <input type="checkbox" class="form-check-input" id="crearTodosCentros"
                                name="crearTodosCentros"> -->
                        </div>
                        <div class="col-md-6">
                            <label for="cuentaPadre">Cuenta Padre:</label>
                            <select class="form-select form-select-sm" id="cuentaPadre" name="cuenta_padre">
                                <option value="">Seleccione Cuenta Padre</option>
                            </select>
                        </div>
                    </div>

                    <!-- Fila 2: Jerarquía dinámica -->
                    <div id="jerarquiaContable" class="row">
                        <!-- Aquí JS insertará dinámicamente los niveles según la cuenta base -->
                    </div>

                    <!-- Fila 3: Código generado y cuenta padre -->
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="codigoCuenta">Código:</label>
                            <input type="text" class="form-control form-control-sm" id="codigoCuenta" name="codigo">
                        </div>
                        
                        <input type="hidden" class="form-control form-control-sm" id="codigoCuenta_vieja" name="codigo_viejo">

                        <div class="col-md-6">
                            <label for="tipoSaldo">Tipo Saldo:</label>
                            <select class="form-select form-select-sm" id="tipoSaldo" name="tipo_saldo" required>
                                <option value="" selected disabled>Seleccione el tipo de saldo</option>
                                {% for tipo in tipo_saldo %}
                                <option value="{{ tipo.0 }}">{{ tipo.1 }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>

                    <!-- Fila 4: Concepto y es cuenta padre -->
                    <div class="row mb-3">
                        <div class="col-md-3 d-flex align-items-center">
                            <label class="form-check-label me-2">¿Es Cuenta Padre?</label>
                            <input type="checkbox" class="form-check-input" id="isCuentaPadre" name="es_cuenta_padre">
                        </div>
                        <div class="col-md-9">
                            <label for="nombreCuenta">Concepto Cuenta:</label>
                            <input type="text" class="form-control form-control-sm" id="nombreCuenta" name="nombre"
                                required>
                        </div>
                    </div>

                    <!-- Fila 5: Descripción -->
                    <div class="row mb-3">
                        <div class="col-md-12">
                            <label for="descripcionCuenta">Descripción de la cuenta:</label>
                            <textarea class="form-control form-control-sm" id="descripcionCuenta"
                                name="descripcion"></textarea>
                        </div>
                    </div>

                    <!-- Fila 6: Tratamiento -->
                    <div class="row mb-3">
                        <div class="col-md-12">
                            <label for="tratamientoCuenta">Tratamiento de la cuenta:</label>
                            <textarea class="form-control form-control-sm" id="tratamientoCuenta"
                                name="tratamiento"></textarea>
                        </div>
                    </div>

                </div>

                <div class="modal-footer">
                    <button type="submit" class="btn btn-success btn-sm">Guardar</button>
                    <button type="button" class="btn btn-danger btn-sm" data-bs-dismiss="modal">Cerrar</button>
                </div>

            </form>


        </div>
    </div>
</div>
