<div class="modal fade" id="modalAutorizacion" tabindex="-1" aria-labelledby="modalAutorizacionLabel" aria-hidden="true"
    data-bs-keyboard="false" data-bs-backdrop="static">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header" style="background-color: #403157">
                <h5 class="modal-title" id="modalAutorizacionLabel" style="color: #fff"></h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>

            <div class="modal-body">

                <div class="row p-1">
                    <form id="formAutorizacion">

                        <div class="row">
                            <input type="hidden" id="tipo_autorizacion">
                        </div>

                        <div class="row">

                            <div class="col-lg-12">

                                <div class="row">
                                    <div class="col-lg-12">
                                        <div class="form-group">
                                            <label for="">Usuario</label>
                                            <input type="text" class="form-control form-control-sm cleanInputs"
                                                id="username" name="username" placeholder="Usuario" autocomplete="off"
                                                required>
                                        </div>
                                    </div>
                                </div>

                                <div class="row">
                                    <div class="col-lg-12">
                                        <div class="form-group">
                                            <label for="">Contraseña</label>
                                            <input style="-webkit-text-security: disc" type="text"
                                                class="form-control form-control-sm" id="password" name="password"
                                                autocomplete="off" required>
                                        </div>
                                    </div>
                                </div>
                            </div>

                        </div>


                        <div class="modal-footer">
                            <button type="submit" class="btn btn-secondary">Guardar</button>
                            <button type="button" class="btn btn-disabled" data-bs-dismiss="modal">Cerrar</button>
                        </div>


                    </form>
                </div>

            </div>

        </div>
    </div>
</div>
