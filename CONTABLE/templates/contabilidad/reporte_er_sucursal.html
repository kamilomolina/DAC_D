{% extends 'componentes/menu_contable.html' %}
{% load static %}

{% block title %} ESTADO DE RESULTADOS POR SUCURSAL {% endblock %}

{% block body %}

<div class="row align-items-center border-bottom mb-2 py-1">
    <div class="col d-flex align-items-center">
        <button id="toggle-sidebar" class="btn btn-warning btn-sm me-2 btnMenu" title="Mostrar/Ocultar menú">
            <i class="fas fa-bars"></i>
        </button>
        <h6 class="page-title mb-0 fs-6 fw-bold">REPORTE ESTADO DE RESULTADOS POR SUCURSAL</h6>
    </div>
</div>

<!-- ===========================
      FILTROS DEL REPORTE
     =========================== -->
<div class="container-fluid card p-3 mb-3">

    <div class="row g-3 align-items-end">

        <!-- EMPRESA -->
        <div class="col-lg-2">
            <label class="fw-bold">Empresa:</label>
            <select id="empresaPartida" class="form-select form-select-sm">
                {% for e in empresasData %}
                <option value="{{ e.id }}">{{ e.nombre }}</option>
                {% endfor %}
            </select>
        </div>

        <!-- SUCURSAL -->
        <div class="col-lg-2">
            <label class="fw-bold">Sucursal:</label>
            <select id="filtroSucursal" class="form-select form-select-sm">
                <option value="0">TODAS</option>
                {% for s in sucursalesData %}
                <option value="{{ s.PKsucursal }}">{{ s.NombreSucursal }}</option>
                {% endfor %}
            </select>
        </div>

        <!-- DESDE -->
        <div class="col-lg-2">
            <label class="fw-bold">Desde:</label>
            <input type="date" id="periodoInicio" class="form-control form-control-sm" value="{{date1}}">
        </div>

        <!-- HASTA -->
        <div class="col-lg-2">
            <label class="fw-bold">Hasta:</label>
            <input type="date" id="periodoFinal" class="form-control form-control-sm" value="{{date2}}">
        </div>

        <!-- FILTRO SALDO -->
        <div class="col-lg-2">
            <label class="fw-bold">Mostrar:</label>
            <select id="filtroSaldo" class="form-select form-select-sm">
                <option value="0">TODAS LAS CUENTAS</option>
                <option value="1">SOLO CON SALDO</option>
            </select>
        </div>

        <div class="col-lg-2 text-end">
            <button class="btn btn-success btn-sm w-100" id="btnLoadData">Cargar</button>
        </div>

    </div>

</div>

<!-- ===========================
      TABLA DEL REPORTE
     =========================== -->
<div class="container-fluid">
    <div class="table-responsive">
        <table id="tablaER" class="table table-striped table-bordered table-sm align-middle table-hover"
            style="width: 100%;">
            <thead class="table-gradient text-dark">
                <tr>
                    <th>Código</th>
                    <th>Cuenta</th>
                    <th>Tipo</th>
                    <th>Saldo Directo</th>
                    <th>Saldo Acumulado</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

{% endblock %}

{% block scripts %}
<script>
    var csrfToken = "{{ csrf_token }}";

    // ============================
    // FUNCIÓN PARA ESTILOS
    // ============================
    function renderConBarraIzquierda(data, type, row, align = 'left') {
        if (type !== 'display') return data;

        let estilo = `
            padding-left:10px;
            border-left: 8px solid #${row.color_hex ?? '999999'};
            font-weight:${row.es_padre == 1 ? 'bold' : 'normal'};
            ${align === 'right' ? 'text-align:right;' : ''}
        `;

        return `<div style="${estilo}">${data}</div>`;
    }

    $('#tablaER').DataTable({
        language: {
            url: "{% static 'app/th/json/es-ES.json' %}",
        }
    });

    function fillTableERSucursales() {
        showLoadingScreen();

        $("#tablaER").DataTable().clear().destroy();

        var tablaER = $('#tablaER').DataTable({
            initComplete: function () {
                Swal.close();
            },
            autoWidth: false,
            scrollX: true,
            scrollY: '50vh',
            scrollCollapse: true,
            pageLength: -1,
            dom: 'Brftip',
            language: {
                url: "{% static 'app/th/json/es-ES.json' %}",
            },
            ajax: {
                url: `{% url 'dataReporteERPorSucursal' %}`,
                type: "POST",
                data: function (d) {
                    d.csrfmiddlewaretoken = csrfToken;
                    d.empresa = $("#empresaPartida").val();
                    d.date1 = $("#periodoInicio").val();
                    d.date2 = $("#periodoFinal").val();
                    d.filtro = $("#filtroSaldo").val();
                    d.sucursal = $("#filtroSucursal").val();
                },
                dataSrc: 'data'
            },

            buttons: [
                { extend: "excel", text: '<i class="fas fa-file-excel"></i>', className: "btn btn-success" },
                { extend: "pdf", text: '<i class="fas fa-file-pdf"></i>', className: "btn btn-danger" },
                { extend: "print", text: '<i class="fas fa-print"></i>', className: "btn btn-primary" }
            ],

            columns: [
                { data: "codigo", render: (d, t, row) => renderConBarraIzquierda(d, t, row) },
                { data: "nombre", render: (d, t, row) => renderConBarraIzquierda(d, t, row) },
                { data: "Cuenta", render: (d, t, row) => renderConBarraIzquierda(d, t, row) },

                {
                    data: "SaldoDirecto",
                    render: function (d, t, row) {
                        if (t !== 'display') return d;
                        let num = Number(d).toLocaleString('es-HN', { minimumFractionDigits: 2 });
                        return renderConBarraIzquierda(num, t, row, 'right');
                    }
                },
                {
                    data: "SaldoAcumulado",
                    render: function (d, t, row) {
                        if (t !== 'display') return d;
                        let num = Number(d).toLocaleString('es-HN', { minimumFractionDigits: 2 });
                        return renderConBarraIzquierda(num, t, row, 'right');
                    }
                }
            ]
        });

    }


    // BOTÓN CARGAR
    $("#btnLoadData").on("click", function () {
        fillTableERSucursales();
    });

</script>
{% endblock %}
