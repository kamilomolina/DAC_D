{% extends 'componentes/menu_contable.html' %}
{% load static %}

{% block title %}ESTADO RESULTADO{% endblock %}

{% block body %}

<div class="row align-items-center border-bottom mb-3 py-2 bg-white shadow-sm mx-0">
    <div class="col d-flex align-items-center px-0">
        <button id="toggle-sidebar" class="btn btn-primary btn-sm me-3 border-0 rounded-circle btnMenu"
            style="width: 32px; height: 32px; padding: 0;" title="Mostrar/Ocultar menú">
            <i class="fas fa-bars"></i>
        </button>
        <h6 class="page-title mb-0 fs-5 fw-bold text-dark">
            <i class="fas fa-chart-pie text-primary me-2"></i>ESTADO RESULTADO
        </h6>
    </div>
</div>

<div class="container-fluid px-0 mt-1">
    <div class="row g-3 d-flex align-items-end mx-0">
        <div class="col-12 col-md-3 mb-3">
            <label>Empresa:</label>
            <select id="selectEmpresa" class="form-select form-select-sm">
                {% for e in empresasData %}
                <option value="{{ e.id }}">{{ e.nombre }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="col-12 col-md-2 mb-3">
            <label for="mes">Mes:</label>
            <select id="mes" class="form-select form-select-sm">
                <option value="1">Enero</option>
                <option value="2">Febrero</option>
                <option value="3">Marzo</option>
                <option value="4">Abril</option>
                <option value="5">Mayo</option>
                <option value="6">Junio</option>
                <option value="7">Julio</option>
                <option value="8">Agosto</option>
                <option value="9">Septiembre</option>
                <option value="10">Octubre</option>
                <option value="11">Noviembre</option>
                <option value="12">Diciembre</option>
            </select>
        </div>

        <div class="col-12 col-md-2 mb-3">
            <label for="anio">Año:</label>
            <select id="anio" class="form-select form-select-sm"></select>
        </div>
        <div class="col-12 col-md-2 mb-3">
            <button class="btn btn-sm btn-success" id="btnLoadData">Cargar</button>
        </div>
    </div>

    <!-- Tabla resumen -->
    <div class="row mx-0 mt-1">
        <div class="table-responsive px-0">
            <table id="tblEstadoResultado"
                class="table table-striped table-bordered mb-0 table-sm rounded-4 table-hover align-middle"
                style="width:100%;">
                <thead class="table-gradient text-dark">
                    <tr>
                        <th>Rubro</th>
                        <th class="text-end">Monto</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <!-- Detalle aparte -->
    <div class="row mx-0 mt-3" id="detalleContainer" style="display:none;">
        <h6 class="px-0">Detalle por cuenta</h6>
        <div class="table-responsive px-0">
            <table id="tblDetalle"
                class="table table-striped table-bordered mb-0 table-sm rounded-4 table-hover align-middle"
                style="width:100%;">
                <thead class="table-gradient text-dark">
                    <tr>
                        <th>Clase</th>
                        <th>Código</th>
                        <th>Descripción</th>
                        <th class="text-end">Saldo</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>

<a href="{% url 'panel_contabilidad' %}">
    <button class="btn btn-sm btn-danger" id="btnCerrar" title="Cerrar"
        style="position: fixed; bottom: 20px; right: 20px;">
        <i class="fa fa-times"></i> Cerrar
    </button>
</a>
{% endblock %}

{% block scripts %}
<script>
    $(function () {
        var csrfToken = "{{ csrf_token }}";
        var varMes = "{{varMonth}}";
        var varAnio = "{{varAnio}}";

        // Inicializar select año
        const anioActual = new Date().getFullYear();
        const selectAnio = $('#anio');
        for (let i = 0; i <= 5; i++) {
            const anio = anioActual - i;
            selectAnio.append(`<option value="${anio}">${anio}</option>`);
        }
        $('#anio').val(varAnio).change();
        $('#mes').val(varMes).change();

        function showLoadingScreen(text = '') {
            Swal.fire({
                title: '',
                html: `<b>${text}</b>`,
                didOpen: () => { Swal.showLoading(); },
                allowOutsideClick: false,
                showConfirmButton: false
            });
        }

        $("#tblEstadoResultado, #tblDetalle").DataTable({
            language: { url: "{% static 'app/th/json/es-ES.json' %}" },
        });


        // Cargar resumen
        function loadEstadoResultado() {
            showLoadingScreen();

            $("#tblEstadoResultado").DataTable().clear().destroy();

            var tbl = $('#tblEstadoResultado').DataTable({
                initComplete: function () { Swal.close(); },
                autoWidth: false,
                scrollX: true,
                paging: false,
                dom: 'Brftip',
                ordering: false,
                language: { url: "{% static 'app/th/json/es-ES.json' %}" },
                ajax: {
                    url: "{% url 'dataEstadoResultado' %}",
                    type: "GET",
                    data: {
                        empresa: $('#selectEmpresa').val(),
                        anio: $('#anio').val(),
                        mes: $('#mes').val()
                    },
                    dataSrc: 'data'
                },
                buttons: [
                    { extend: 'excel', text: '<i class="fas fa-file-excel"></i>', className: 'btn btn-success' },
                    { extend: 'pdf', text: '<i class="fas fa-file-pdf"></i>', className: 'btn btn-danger' },
                    { extend: 'print', text: '<i class="fas fa-print"></i>', className: 'btn btn-primary', orientation: 'landscape' }
                ],
                columns: [
                    { data: 'rubro' },
                    { data: 'monto', className: 'text-end', render: $.fn.dataTable.render.number(',', '.', 2) }
                ],
                rowCallback: function (row, data) {
                    if (data.rubro.includes("Utilidad")) {
                        $(row).addClass("table-success fw-bold");
                    }
                    if (data.rubro === "Utilidad Neta") {
                        $(row).addClass("table-dark text-white fw-bold");
                    }
                }
            });

            // Expandibles con detalle
            $('#tblEstadoResultado tbody').off('click').on('click', 'tr', function () {
                var tr = $(this);
                var row = tbl.row(tr);

                if (row.child.isShown()) {
                    row.child.hide();
                    tr.removeClass('shown');
                } else {
                    showLoadingScreen("");
                    $.get("{% url 'dataEstadoResultadoDetalle' %}", {
                        empresa: $('#selectEmpresa').val(),
                        anio: $('#anio').val(),
                        mes: $('#mes').val()
                    }, function (resp) {
                        Swal.close();
                        if (resp.success) {
                            let html = "<table class='table table-sm mb-0'>";
                            html += "<thead><tr><th>Código</th><th>Descripción</th><th class='text-end'>Saldo</th></tr></thead><tbody>";
                            let clase = row.data().rubro.charAt(0);
                            resp.data
                                .filter(d => d.clase === clase)
                                .forEach(d => {
                                    html += `<tr>
                                                <td>${d.codigo}</td>
                                                <td>${d.descripcion}</td>
                                                <td class="text-end">${parseFloat(d.saldo).toLocaleString()}</td>
                                            </tr>`;
                                });
                            html += "</tbody></table>";
                            row.child(html).show();
                            tr.addClass('shown');
                        }
                    });
                }
            });

            // También cargar tabla detalle aparte
            loadDetalle();
        }

        // Cargar detalle aparte
        function loadDetalle() {
            $("#tblDetalle").DataTable().clear().destroy();
            $('#tblDetalle').DataTable({
                initComplete: function () { Swal.close(); },
                autoWidth: false,
                scrollX: true,
                scrollY: '50vh',
                scrollCollapse: true,
                pageLength: -1,
                dom: 'Brftip',
                ordering: false,
                language: { url: "{% static 'app/th/json/es-ES.json' %}" },
                buttons: [
                    { extend: 'excel', text: '<i class="fas fa-file-excel"></i>', className: 'btn btn-success' },
                    { extend: 'pdf', text: '<i class="fas fa-file-pdf"></i>', className: 'btn btn-danger' },
                    { extend: 'print', text: '<i class="fas fa-print"></i>', className: 'btn btn-primary', orientation: 'landscape' }
                ],
                ajax: {
                    url: "{% url 'dataEstadoResultadoDetalle' %}",
                    type: "GET",
                    data: {
                        empresa: $('#selectEmpresa').val(),
                        anio: $('#anio').val(),
                        mes: $('#mes').val()
                    },
                    dataSrc: 'data'
                },
                columns: [
                    { data: 'clase' },
                    { data: 'codigo' },
                    { data: 'descripcion' },
                    { data: 'saldo', className: 'text-end', render: $.fn.dataTable.render.number(',', '.', 2) }
                ]
            });

            $("#detalleContainer").show();
        }

        $('#btnLoadData').on('click', loadEstadoResultado);
    });
</script>
{% endblock %}
