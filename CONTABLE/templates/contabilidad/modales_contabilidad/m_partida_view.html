<div class="modal fade" id="modalPartidaView" tabindex="-1" aria-labelledby="modalPartidaViewLabel" aria-hidden="true"
    data-bs-keyboard="false" data-bs-backdrop="static">
    <div class="modal-dialog modal-xl">
        <div class="modal-content">

            <div class="modal-header bg-danger text-white">
                <h5 class="modal-title fw-bold">Partida #<span id="modalNpartida"></span></h5>
            </div>

            <div class="modal-body">

                <div class="row">
                    <div class="col-auto">
                        <p><strong>Sinopsis:</strong> <span id="modalSinopsis"></span></p>
                        <p><strong>Fecha:</strong> <span id="modalFecha"></span></p>
                    </div>
                    <div class="col-auto">
                        <p><strong>Usuario:</strong><span id="modalUsuario"></span></p>
                        <p><strong>Sucursal:</strong><span id="modalSucursal"></span></p>
                    </div>
                </div>

                <div class="d-flex gap-2 mb-2">
                    <button class="btn btn-success btn-sm" onclick="exportarExcel()">Exportar a Excel</button>
                    <button class="btn btn-primary btn-sm" onclick="copiarTabla()">Copiar</button>
                </div>                

                <div class="table-responsive" style="max-height: 350px; overflow-y: auto;">
                    <table class="table table-bordered table-sm table-hover mb-0" style="width: 100%;">
                        <thead class="table-light sticky-top" style="top: 0; z-index: 2;">
                            <tr>
                                <th class="text-center">Código</th>
                                <th class="text-center">Cuenta</th>
                                <th class="text-center">Debe</th>
                                <th class="text-center">Haber</th>
                            </tr>
                        </thead>
                
                        <tbody id="detallePartidaBody"></tbody>
                
                        <tfoot class="table-secondary fw-bold sticky-bottom" style="bottom: 0; z-index: 1;">
                            <tr>
                                <td colspan="2" class="text-end">Totales:</td>
                                <td id="totalDebe" class="currency">0.00</td>
                                <td id="totalHaber" class="currency">0.00</td>
                            </tr>
                        </tfoot>
                    </table>
                </div>
                
                <div class="row mt-2">
                    <div class="col d-flex justify-content-end align-items-end">
                        <p><strong>Balance:</strong> L <span class="ms-1" id="modalBalance"></span></p>
                    </div>
                </div>
            </div>


            <div class="modal-footer">
                <button type="button" class="btn btn-warning btn-sm" id="btnEstructuraOriginalPartida"
                    data-bs-dismiss="modal">Ver
                    Estructura Original</button>
                <button type="button" class="btn btn-info btn-sm" id="btnDetallesPartida" data-bs-dismiss="modal">Ver
                    Detalles</button>
                <button type="button" class="btn btn-success btn-sm" id="btnReportePartida"
                    data-bs-dismiss="modal">Imprimir</button>
                <button type="button" class="btn btn-danger btn-sm" data-bs-dismiss="modal">Cerrar</button>
            </div>

        </div>
    </div>
</div>
