<div class="modal fade" id="modalConfig" tabindex="-1" aria-labelledby="modalConfigLabel" aria-hidden="true"
    data-bs-keyboard="false" data-bs-backdrop="static">

    <div class="modal-dialog modal-lg">
        <div class="modal-content">

            <div class="modal-header" style="background-color: #feffd6; color: white;">
                <h5 class="modal-title" id="modalConfigLabel" style="color: #525252;">
                    <i class="material-icons me-2 text-gray">list</i>
                    CONFIGURACIÓN
                </h5>

                <button type="button" class="close" data-bs-dismiss="modal" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>

            <form id="formConfig">
                <div class="modal-body">

                    <div class="row">

                        <div class="col-lg-6">
                            <div class="form-group">
                                <label for="configuracion">Configuración:</label>
                                <input type="text" class="form-control form-control-sm" id="configuracion"
                                    name="configuracion">
                            </div>
                        </div>

                        <div class="col-lg-6">
                            <div class="form-group">
                                <label for="valor">Valor:</label>
                                <input type="text" class="form-control form-control-sm" id="valor" name="valor">
                            </div>
                        </div>

                    </div>

                </div>

                <div class="modal-footer">
                    <button type="submit" class="btn btn-success btn-sm">Guardar</button>
                    <button type="button" class="btn btn-danger btn-sm" data-bs-dismiss="modal">Cerrar</button>
                </div>

            </form>

        </div>
    </div>
</div>






<div class="modal fade" id="modalHistoricoConfig" tabindex="-1" aria-labelledby="modalHistoricoConfigLabel"
    aria-hidden="true" data-bs-keyboard="false" data-bs-backdrop="static">

    <div class="modal-dialog modal-lg">
        <div class="modal-content">

            <div class="modal-header" style="background-color: #feffd6; color: white;">
                <h5 class="modal-title" id="modalHistoricoConfigLabel" style="color: #525252;">
                    <i class="material-icons me-2 text-gray">history</i>
                    HISTÓRICO DE CONFIGURACIÓN
                </h5>

                <button type="button" class="close" data-bs-dismiss="modal">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>

            <div class="modal-body">

                <div class="table-responsive">
                    <table id="historicoConfigTable"
                        class="table table-striped table-bordered table-hover table-sm rounded-4" style="width:100%;">
                        <thead class="table-gradient text-dark">
                            <tr>
                                <th>Configuración</th>
                                <th>Valor</th>
                                <th>Fecha</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>

            </div>

            <div class="modal-footer">
                <button type="button" class="btn btn-danger btn-sm" data-bs-dismiss="modal">Cerrar</button>
            </div>

        </div>
    </div>

</div>
